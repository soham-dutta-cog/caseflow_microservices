server:
  port: 9001

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: iam
          uri: lb://iam-service
          predicates:
            - Path=/api/auth/**

        - id: iam-2
          uri: lb://iam-service
          predicates:
            - Path=/api/users/**
          filters:
            - AuthenticationFilter

        - id: case
          uri: lb://case-service
          predicates:
            - Path=/api/cases/**
          filters:
            - AuthenticationFilter

        - id: hearing
          uri: lb://hearing-service
          predicates:
            - Path=/api/hearings/**
          filters:
            - AuthenticationFilter

        - id: workflow
          uri: lb://workflow-service
          predicates:
            - Path=/api/workflow/**
          filters:
            - AuthenticationFilter

        - id: appeal
          uri: lb://appeal-service
          predicates:
            - Path=/api/appeals/**
          filters:
            - AuthenticationFilter

        - id: compliance
          uri: lb://compliance-service
          predicates:
            - Path=/api/compliance/**
          filters:
            - AuthenticationFilter

        - id: compliance-2
          uri: lb://compliance-service
          predicates:
            - Path=/api/audits/**
          filters:
            - AuthenticationFilter

        - id: notification
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - AuthenticationFilter

        - id: reporting
          uri: lb://reporting-service
          predicates:
            - Path=/api/reports/**
          filters:
            - AuthenticationFilter

        # ── Swagger / OpenAPI doc proxy routes (no auth required) ────────────
        - id: iam-swagger
          uri: lb://iam-service
          predicates:
            - Path=/iam/api-docs
          filters:
            - StripPrefix=1

        - id: case-swagger
          uri: lb://case-service
          predicates:
            - Path=/case/api-docs
          filters:
            - StripPrefix=1

        - id: hearing-swagger
          uri: lb://hearing-service
          predicates:
            - Path=/hearing/api-docs
          filters:
            - StripPrefix=1

        - id: workflow-swagger
          uri: lb://workflow-service
          predicates:
            - Path=/workflow/api-docs
          filters:
            - StripPrefix=1

        - id: appeal-swagger
          uri: lb://appeal-service
          predicates:
            - Path=/appeal/api-docs
          filters:
            - StripPrefix=1

        - id: compliance-swagger
          uri: lb://compliance-service
          predicates:
            - Path=/compliance/api-docs
          filters:
            - StripPrefix=1

        - id: notification-swagger
          uri: lb://notification-service
          predicates:
            - Path=/notification/api-docs
          filters:
            - StripPrefix=1

        - id: reporting-swagger
          uri: lb://reporting-service
          predicates:
            - Path=/reporting/api-docs
          filters:
            - StripPrefix=1

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders: "*"
            allowCredentials: false

jwt:
  secret: caseflow_secret_key_must_be_32chars_min_!!!

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

springdoc:
  swagger-ui:
    urls:
      - name: IAM Service
        url: /iam/api-docs
      - name: Case Service
        url: /case/api-docs
      - name: Workflow Service
        url: /workflow/api-docs
      - name: Hearing Service
        url: /hearing/api-docs
      - name: Appeal Service
        url: /appeal/api-docs
      - name: Compliance Service
        url: /compliance/api-docs
      - name: Notification Service
        url: /notification/api-docs
      - name: Reporting Service
        url: /reporting/api-docs