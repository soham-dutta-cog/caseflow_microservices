server:
  port: 8085

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # ========== IAM SERVICE ==========
        - id: iam-auth
          uri: lb://iam-service
          predicates:
            - Path=/api/auth/**

        - id: iam-users
          uri: lb://iam-service
          predicates:
            - Path=/api/users/**

        - id: iam-swagger
          uri: lb://iam-service
          predicates:
            - Path=/iam/swagger-ui/**, /iam/v3/api-docs/**, /iam/api-docs/**, /iam/api-docs/, /iam/v3/api-docs/
          filters:
            - StripPrefix=1

        # ========== CASE SERVICE ==========
        - id: case-service
          uri: lb://case-service
          predicates:
            - Path=/api/cases/**

        - id: case-swagger
          uri: lb://case-service
          predicates:
            - Path=/case/swagger-ui/**, /case/v3/api-docs/**, /case/api-docs/**, /case/api-docs/, /case/v3/api-docs/
          filters:
            - StripPrefix=1

        # ========== HEARING SERVICE ==========
        - id: hearing-service
          uri: lb://hearing-service
          predicates:
            - Path=/api/hearings/**

        - id: hearing-swagger
          uri: lb://hearing-service
          predicates:
            - Path=/hearing/swagger-ui/**, /hearing/v3/api-docs/**, /hearing/api-docs/**, /hearing/api-docs/, /hearing/v3/api-docs/
          filters:
            - StripPrefix=1

        # ========== WORKFLOW SERVICE ==========
        - id: workflow-service
          uri: lb://workflow-service
          predicates:
            - Path=/api/workflow/**

        - id: workflow-swagger
          uri: lb://workflow-service
          predicates:
            - Path=/workflow/swagger-ui/**, /workflow/v3/api-docs, /workflow/v3/api-docs/**, /workflow/api-docs, /workflow/api-docs/**
          filters:
            - StripPrefix=1

        # ========== APPEAL SERVICE ==========
        - id: appeal-service
          uri: lb://appeal-service
          predicates:
            - Path=/api/appeals/**

        - id: appeal-swagger
          uri: lb://appeal-service
          predicates:
            - Path=/appeal/swagger-ui/**, /appeal/v3/api-docs/**, /appeal/api-docs/**, /appeal/api-docs/, /appeal/v3/api-docs/
          filters:
            - StripPrefix=1

        # ========== COMPLIANCE SERVICE ==========
        - id: compliance-service
          uri: lb://compliance-service
          predicates:
            - Path=/api/compliance/**

        - id: compliance-audits
          uri: lb://compliance-service
          predicates:
            - Path=/api/audits/**

        - id: compliance-swagger
          uri: lb://compliance-service
          predicates:
            - Path=/compliance/swagger-ui/**, /compliance/v3/api-docs/**, /compliance/api-docs/**, /compliance/api-docs/, /compliance/v3/api-docs/
          filters:
            - StripPrefix=1

        # ========== NOTIFICATION SERVICE ==========
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

        - id: notification-swagger
          uri: lb://notification-service
          predicates:
            - Path=/notification/swagger-ui/**, /notification/v3/api-docs/**, /notification/api-docs/**, /notification/api-docs/, /notification/v3/api-docs/
          filters:
            - StripPrefix=1

        # ========== REPORTING SERVICE ==========
        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/api/reports/**

        - id: reporting-swagger
          uri: lb://reporting-service
          predicates:
            - Path=/reporting/swagger-ui/**, /reporting/v3/api-docs/**, /reporting/api-docs/**, /reporting/api-docs/, /reporting/v3/api-docs/
          filters:
            - StripPrefix=1

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            exposed-headers: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

springdoc:
  swagger-ui:
    urls:
      - name: IAM Service
        url: /iam/api-docs
      - name: Case Service
        url: /case/api-docs
      - name: Workflow Service
        url: /workflow/api-docs
      - name: Hearing Service
        url: /hearing/api-docs
      - name: Appeal Service
        url: /appeal/api-docs
      - name: Compliance Service
        url: /compliance/api-docs
      - name: Notification Service
        url: /notification/api-docs
      - name: Reporting Service
        url: /reporting/api-docs