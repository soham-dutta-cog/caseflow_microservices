spring:
  application:
    name: reporting-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:mysql://localhost:3306/caseflow_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 30000
        loggerLevel: BASIC

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
    instances:
      case-service:        { base-config: default }
      hearing-service:     { base-config: default }
      workflow-service:    { base-config: default }
      appeal-service:      { base-config: default }
      compliance-service:  { base-config: default }
  timelimiter:
    configs:
      default:
        timeout-duration: 30s
    instances:
      case-service:        { base-config: default }
      hearing-service:     { base-config: default }
      workflow-service:    { base-config: default }
      appeal-service:      { base-config: default }
      compliance-service:  { base-config: default }

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
