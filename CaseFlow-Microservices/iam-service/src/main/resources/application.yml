spring:
  application:
    name: iam-service
  config:
    import: optional:configserver:http://localhost:8888

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

app:
  mail:
    from-name: CaseFlow Admin
    from-address: ${spring.mail.username:}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
